<div class="employees-container" dir="rtl">
  
  <header class="page-header animate-fade-in">
    <h1>الموظفون</h1>
    <button class="btn-primary" (click)="openModal()">
      <span class="icon">+</span> إضافة موظف
    </button>
  </header>

  <div class="table-card animate-slide-up">
    <div class="card-header">
      <h3>فرع الرياض العليا</h3>
    </div>
    
    <div class="table-responsive">
      <table class="employees-table">
        <thead>
          <tr>
            <th>الموظف</th>
            <th>الدور</th>
            <th>الراتب</th>
            <th>الشفت</th>
            <th>الحالة</th>
          </tr>
        </thead>
        <tbody>
          @for (emp of employees; track emp.name) {
            <tr>
              <td>
                <div class="employee-info">
                  <div class="avatar">{{ emp.initial }}</div>
                  <span class="emp-name">{{ emp.name }}</span>
                </div>
              </td>
              <td class="text-muted">{{ emp.role }}</td>
              <td class="font-bold">{{ emp.salary | number }} ر.س</td>
              <td class="text-muted">{{ emp.shift }}</td>
              <td>
                <span class="status-badge" [class.active]="emp.status === 'نشط'" [class.leave]="emp.status === 'إجازة'">
                  {{ emp.status }}
                </span>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

  @if (isModalOpen) {
    <div class="modal-overlay animate-fade-in" (click)="closeModal()">
      <div class="modal-content animate-pop-in" (click)="$event.stopPropagation()">
        
        <div class="modal-header">
          <h2>إضافة موظف جديد</h2>
          <button class="btn-close" (click)="closeModal()">&times;</button>
        </div>

        <div class="modal-body">
          <div class="form-group">
            <label>اسم الموظف</label>
            <input type="text" [(ngModel)]="newEmployee.name" placeholder="أدخل اسم الموظف" class="form-control">
          </div>

          <div class="form-group">
            <label>الدور / الوظيفة</label>
            <input type="text" [(ngModel)]="newEmployee.role" placeholder="مثال: كاشير" class="form-control">
          </div>

          <div class="form-group">
            <label>الراتب (ر.س)</label>
            <input type="number" [(ngModel)]="newEmployee.salary" placeholder="أدخل الراتب" class="form-control">
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label>الشفت</label>
              <select [(ngModel)]="newEmployee.shift" class="form-control">
                <option value="صباحي">صباحي</option>
                <option value="مسائي">مسائي</option>
              </select>
            </div>
            
            <div class="form-group half">
              <label>الحالة</label>
              <select [(ngModel)]="newEmployee.status" class="form-control">
                <option value="نشط">نشط</option>
                <option value="إجازة">إجازة</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn-secondary" (click)="closeModal()">إلغاء</button>
          <button class="btn-primary" (click)="saveEmployee()">حفظ وإضافة</button>
        </div>

      </div>
    </div>
  }

</div>
