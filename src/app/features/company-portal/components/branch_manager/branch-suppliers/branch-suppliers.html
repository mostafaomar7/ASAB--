<div class="suppliers-container" dir="rtl">
  
  <header class="page-header animate-fade-in">
    <h1>الموردون</h1>
  </header>

  <div class="card animate-slide-up delay-1">
    <div class="card-header">
      <h2>الموردون المعتمدون</h2>
    </div>
    
    <div class="suppliers-list">
      @for (supplier of suppliers; track supplier.id; let i = $index) {
        <div class="supplier-item animate-slide-in-right" [style.animation-delay]="(i * 0.1) + 0.2 + 's'">
          
          <div class="supplier-info">
            <div class="avatar">{{ supplier.initial }}</div>
            <div class="supplier-details">
              <span class="supplier-name">{{ supplier.name }}</span>
              <span class="supplier-desc">{{ supplier.desc }}</span>
            </div>
          </div>

          <div class="supplier-contact">
            <span class="phone-number" dir="ltr">{{ supplier.phone }}</span>
            <div class="phone-icon-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
            </div>
          </div>
          
        </div>
      }
    </div>
  </div>

</div>
